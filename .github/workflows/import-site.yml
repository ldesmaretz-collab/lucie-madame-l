name: Import Studio Madame-L site

on:
  push:
    paths:
      - site.zip.b64
      - .github/workflows/import-site.yml
  workflow_dispatch:

jobs:
  import-site:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message != 'Publish extracted Studio Madame-L site'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract site bundle
        run: |
          test -f site.zip.b64
          base64 -d site.zip.b64 > site.zip
          rm -rf assets en projects
          rm -f index.html styles.css script.js robots.txt sitemap.xml mentions-legales.html confidentialite.html lucie.html netlify.toml _headers DEPLOY_NETLIFY.txt README.md site.zip.b64 Lucie-Madame-L-Netlify-ready.zip
          unzip -o site.zip
          rm site.zip
      - name: Commit site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish extracted Studio Madame-L site" || exit 0
          git push
