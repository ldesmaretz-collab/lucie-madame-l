name: Import Studio Madame-L site from parts

on:
  push:
    paths:
      - site.zip.b64.part-*
      - site.zip.b64.parts
      - .github/workflows/import-site-parts.yml
  workflow_dispatch:

jobs:
  import-site:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message != 'Publish extracted Studio Madame-L site'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check parts
        id: parts
        shell: bash
        run: |
          if [ ! -f site.zip.b64.parts ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          expected=$(cat site.zip.b64.parts | tr -d '[:space:]')
          actual=$(ls site.zip.b64.part-* 2>/dev/null | wc -l | tr -d '[:space:]')
          echo "expected=$expected actual=$actual"
          if [ "$actual" != "$expected" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
      - name: Extract site bundle
        if: steps.parts.outputs.ready == 'true'
        shell: bash
        run: |
          cat $(ls site.zip.b64.part-* | sort) > site.zip.b64
          base64 -d site.zip.b64 > site.zip
          rm -rf assets en projects
          rm -f index.html styles.css script.js robots.txt sitemap.xml mentions-legales.html confidentialite.html lucie.html netlify.toml _headers DEPLOY_NETLIFY.txt README.md site.zip.b64 site.zip.b64.part-* site.zip.b64.parts Lucie-Madame-L-Netlify-ready.zip
          unzip -o site.zip || true
          rm -f site.zip
      - name: Commit site files
        if: steps.parts.outputs.ready == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish extracted Studio Madame-L site" || exit 0
          git push
